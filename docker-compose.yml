version: '3.8'

services:
  # ==========================================
  # 1. MOTOR DE DADOS: POSTGRESQL 15
  # ==========================================
  database:
    image: postgres:15
    container_name: sistema_os_database
    restart: always
    environment:
      POSTGRES_DB: sistema_os_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root_password_ufam_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_os_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - os_network

  # ==========================================
  # 2. CAMADA DE NEGÓCIO: FASTAPI ASGI
  # ==========================================
  backend:
    build: ./os-backend
    container_name: sistema_os_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:root_password_ufam_2026@database:5432/sistema_os_db"
      SECRET_KEY: "SUPER_SECRET_KEY_MIGRACAO_UFAM_ICET_2026_SECURITY"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: 587
      SMTP_USER: "arnaldff@gmail.com"
      SMTP_PASSWORD: "lsjcpvgpmamlvjdb"
    volumes:
      # Volume nomeado compartilhado para as fotos persistirem e não sumirem no down
      - os_media_data:/app/.data/uploads
    depends_on:
      database:
        condition: service_healthy
    networks:
      - os_network

  # ==========================================
  # 3. CAMADA DE APRESENTAÇÃO: REACT + VITE
  # ==========================================
  frontend:
    build: ./os-frontend
    container_name: sistema_os_frontend
    restart: always
    ports:
      - "5600:5600"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - os_network

volumes:
  postgres_data:
  os_media_data:

networks:
  os_network:
    driver: bridge